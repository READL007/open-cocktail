{% extends "base.html" %}

{% block content %}
<h1>List of Cocktails</h1>
<form method="GET"> <input type="text" name="q" placeholder="Search by name or category" value="{{ query }}"> <button type="submit">Search</button> </form>
<ul>
  {% for cocktail in cocktails %}
    <li>
      <a href="{% url 'cocktail_detail' cocktail.id %}">{{ cocktail.name }}</a>
      ({{ cocktail.category }})
    </li>
  {% empty %}
    <li>No cocktails found.</li>
  {% endfor %}
</ul>
{% endblock %}
